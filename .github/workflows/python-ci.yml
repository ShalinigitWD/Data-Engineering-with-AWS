name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r serverless-etl-pipeline/requirements.txt

      - name: Check Python Syntax
        run: |
          python -m py_compile serverless-etl-pipeline/lambda/lambda_function.py
